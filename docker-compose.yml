services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ticket_intelligence
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-node/sql/000_create_tickets.sql:/docker-entrypoint-initdb.d/000_create_tickets.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend-node
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: ticket_user
      DB_PASSWORD: ticket_password
      DB_NAME: ticket_intelligence
      DB_PORT: 3306
      ML_SERVICE_URL: http://ml-service:8001
      ML_TIMEOUT_MS: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
